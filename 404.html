<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404</title>
    <script>
      // SPA fallback for GitHub Pages: fetch and render the app index
      (function () {
        // Hard-coded repo base — update if your repo name changes
        var base = '/personal-website'
        var indexUrl = base + '/index.html'

        fetch(indexUrl)
          .then(function (res) { return res.text() })
          .then(function (html) {
            document.open()
            document.write(html)
            // Keep the original URL in the address bar
            history.replaceState(null, '', location.pathname + location.search + location.hash)
            document.close()
          })
          .catch(function () {
            // If fetching index fails, redirect to repo root
            location.replace(base + '/')
          })
      })()
    </script>
  </head>
  <body></body>
</html>
